services:
  # Backend API service (Docker-based to support Git cloning CLI requirements)
  - type: web
    name: sourcesage-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: MODEL_NAME
        value: gemini-2.5-flash
      # Note: GOOGLE_API_KEY can be added here or entered directly in the frontend UI settings.

  # Frontend static site (React + Vite)
  - type: web
    name: sourcesage-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      # Automatically binds the deployed backend's URL to the frontend environment variable at build time
      - key: VITE_API_BASE_URL
        fromService:
          name: sourcesage-backend
          type: web
          property: host
